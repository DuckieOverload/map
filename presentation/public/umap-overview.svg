  <circle class="anim" style="--from:translate(60px,50px)" cx="580" cy="140" r="5" fill="#FF6F00"/>
  <circle class="anim" style="--from:translate(-40px,-60px)" cx="588" cy="147" r="5" fill="#FF6F00"/>
  <circle class="anim" style="--from:translate(80px,-30px)" cx="575" cy="150" r="5" fill="#FF6F00"/>
  <circle class="anim" style="--from:translate(-60px,40px)" cx="592" cy="135" r="5" fill="#FF6F00"/>

  <!-- Legend -->
  <circle cx="480" cy="305" r="5" fill="#9E9E9E"/><text x="492" y="309" font-size="10" fill="#333" font-family="Arial">QCD</text>
  <circle cx="540" cy="305" r="5" fill="#D32F2F"/><text x="552" y="309" font-size="10" fill="#333" font-family="Arial">H-bb</text>
  <circle cx="610" cy="305" r="5" fill="#1565C0"/><text x="622" y="309" font-size="10" fill="#333" font-family="Arial">t-bqq</text>
  <circle cx="685" cy="305" r="5" fill="#388E3C"/><text x="697" y="309" font-size="10" fill="#333" font-family="Arial">W-qq</text>
  <circle cx="755" cy="305" r="5" fill="#7B1FA2"/><text x="767" y="309" font-size="10" fill="#333" font-family="Arial">Z-qq</text>
  <circle cx="815" cy="305" r="5" fill="#FF6F00"/><text x="827" y="309" font-size="10" fill="#333" font-family="Arial">g</text>
</svg>
