  <circle class="anim" style="--from:translate(-40px,-30px)" cx="630" cy="170" r="5" fill="#7B1FA2"/>
  <circle class="anim" style="--from:translate(30px,40px)" cx="638" cy="177" r="5" fill="#7B1FA2"/>
  <circle class="anim" style="--from:translate(-50px,20px)" cx="625" cy="180" r="5" fill="#7B1FA2"/>
  <circle class="anim" style="--from:translate(40px,-35px)" cx="642" cy="165" r="5" fill="#7B1FA2"/>

