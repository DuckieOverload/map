  <circle class="anim" style="--from:translate(-50px,-70px)" cx="750" cy="230" r="5" fill="#1565C0"/>
  <circle class="anim" style="--from:translate(-30px,-80px)" cx="758" cy="237" r="5" fill="#1565C0"/>
  <circle class="anim" style="--from:translate(-60px,-55px)" cx="745" cy="240" r="5" fill="#1565C0"/>
  <circle class="anim" style="--from:translate(-40px,-90px)" cx="762" cy="225" r="5" fill="#1565C0"/>
  <circle class="anim" style="--from:translate(-20px,-65px)" cx="752" cy="244" r="5" fill="#1565C0"/>

  <!-- Green cluster (W-qq) — scattered from right, converge to bottom-left -->
  <circle class="anim" style="--from:translate(70px,-50px)" cx="510" cy="245" r="5" fill="#388E3C"/>
  <circle class="anim" style="--from:translate(50px,-40px)" cx="518" cy="252" r="5" fill="#388E3C"/>
