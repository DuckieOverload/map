<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="850" height="320">
  <style>
    @keyframes cluster { 0%,10% { transform: var(--from); opacity:0.7; } 60%,100% { transform: translate(0,0); opacity:1; } }
    .anim { animation: cluster 3s ease-in-out 1s both; }
  </style>

  <!-- Left panel: Pretrained (static) -->
  <rect x="15" y="10" width="390" height="280" rx="10" fill="#FAFAFA" stroke="#ddd" stroke-width="1.5"/>
  <text x="210" y="38" text-anchor="middle" font-size="14" font-weight="bold" fill="#182B49" font-family="Arial">Pretrained (Before Fine-Tuning)</text>
  <text x="210" y="58" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Silhouette: 0.077</text>
  <circle cx="120" cy="150" r="5" fill="#9E9E9E" opacity="0.7"/><circle cx="140" cy="165" r="5" fill="#9E9E9E" opacity="0.7"/>
  <circle cx="108" cy="172" r="5" fill="#9E9E9E" opacity="0.7"/><circle cx="155" cy="148" r="5" fill="#9E9E9E" opacity="0.7"/>
  <circle cx="130" cy="180" r="5" fill="#9E9E9E" opacity="0.7"/><circle cx="148" cy="158" r="5" fill="#9E9E9E" opacity="0.7"/>
  <circle cx="200" cy="110" r="5" fill="#D32F2F" opacity="0.7"/><circle cx="220" cy="128" r="5" fill="#D32F2F" opacity="0.7"/>
  <circle cx="190" cy="132" r="5" fill="#D32F2F" opacity="0.7"/><circle cx="230" cy="115" r="5" fill="#D32F2F" opacity="0.7"/>
  <circle cx="212" cy="100" r="5" fill="#D32F2F" opacity="0.7"/>
  <circle cx="280" cy="195" r="5" fill="#1565C0" opacity="0.7"/><circle cx="300" cy="210" r="5" fill="#1565C0" opacity="0.7"/>
  <circle cx="268" cy="215" r="5" fill="#1565C0" opacity="0.7"/><circle cx="310" cy="190" r="5" fill="#1565C0" opacity="0.7"/>
  <circle cx="290" cy="225" r="5" fill="#1565C0" opacity="0.7"/>
  <circle cx="170" cy="225" r="5" fill="#388E3C" opacity="0.7"/><circle cx="188" cy="240" r="5" fill="#388E3C" opacity="0.7"/>
  <circle cx="158" cy="245" r="5" fill="#388E3C" opacity="0.7"/><circle cx="195" cy="228" r="5" fill="#388E3C" opacity="0.7"/>
  <circle cx="240" cy="160" r="5" fill="#7B1FA2" opacity="0.7"/><circle cx="178" cy="195" r="5" fill="#7B1FA2" opacity="0.7"/>
  <circle cx="258" cy="140" r="5" fill="#7B1FA2" opacity="0.7"/><circle cx="155" cy="142" r="5" fill="#7B1FA2" opacity="0.7"/>
  <circle cx="330" cy="140" r="5" fill="#FF6F00" opacity="0.7"/><circle cx="345" cy="250" r="5" fill="#FF6F00" opacity="0.7"/>
  <circle cx="100" cy="250" r="5" fill="#FF6F00" opacity="0.7"/>

  <!-- Right panel: After Fine-Tuning (animated from scattered → clustered) -->
  <rect x="445" y="10" width="390" height="280" rx="10" fill="#FAFAFA" stroke="#ddd" stroke-width="1.5"/>
  <text x="640" y="38" text-anchor="middle" font-size="14" font-weight="bold" fill="#182B49" font-family="Arial">After Fine-Tuning</text>
  <text x="640" y="58" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Silhouette: 0.206 (2.7x better)</text>

  <!-- Gray cluster (QCD) — scattered from center, converge to top-left -->
  <circle class="anim" style="--from:translate(40px,50px)" cx="500" cy="105" r="5" fill="#9E9E9E"/>
  <circle class="anim" style="--from:translate(20px,40px)" cx="508" cy="112" r="5" fill="#9E9E9E"/>
  <circle class="anim" style="--from:translate(60px,30px)" cx="495" cy="115" r="5" fill="#9E9E9E"/>
  <circle class="anim" style="--from:translate(-10px,55px)" cx="512" cy="100" r="5" fill="#9E9E9E"/>
  <circle class="anim" style="--from:translate(50px,20px)" cx="503" cy="118" r="5" fill="#9E9E9E"/>
  <circle class="anim" style="--from:translate(30px,60px)" cx="515" cy="108" r="5" fill="#9E9E9E"/>

