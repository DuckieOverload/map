<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <style>
    @keyframes burst { 0%,5% { opacity:0; transform:scale(0.2); } 15% { opacity:1; transform:scale(1.05); } 20%,100% { opacity:1; transform:scale(1); } }
    @keyframes glow { 0%,100% { opacity:0.7; } 50% { opacity:1; } }
    .spark1 { animation: burst 5s ease-out 0s infinite; transform-origin: 150px 140px; }
    .spark2 { animation: burst 5s ease-out 0.3s infinite; transform-origin: 450px 140px; }
    .spark3 { animation: burst 5s ease-out 0.6s infinite; transform-origin: 750px 140px; }
    .tip { animation: glow 2s ease-in-out infinite; }
  </style>

  <rect x="15" y="10" width="270" height="260" rx="12" fill="#FDF8EC" stroke="#C69214" stroke-width="2"/>
  <text x="150" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#182B49" font-family="Arial">Chrysanthemum</text>
  <text x="150" y="58" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">(2-prong pattern)</text>
  <circle cx="150" cy="140" r="5" fill="#FF6F00"/>
  <g class="spark1">
    <line x1="150" y1="140" x2="150" y2="80" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="150" cy="78" r="4" fill="#FFD54F"/>
    <line x1="150" y1="140" x2="210" y2="100" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="212" cy="98" r="4" fill="#FFD54F"/>
    <line x1="150" y1="140" x2="210" y2="180" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="212" cy="182" r="4" fill="#FFD54F"/>
    <line x1="150" y1="140" x2="150" y2="200" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="150" cy="202" r="4" fill="#FFD54F"/>
    <line x1="150" y1="140" x2="90" y2="180" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="88" cy="182" r="4" fill="#FFD54F"/>
    <line x1="150" y1="140" x2="90" y2="100" stroke="#FF6F00" stroke-width="2.5"/><circle class="tip" cx="88" cy="98" r="4" fill="#FFD54F"/>
  </g>
  <text x="150" y="238" text-anchor="middle" font-size="12" fill="#333" font-family="Arial">= H to bb jet</text>
  <text x="150" y="256" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Long radial streaks</text>

  <rect x="315" y="10" width="270" height="260" rx="12" fill="#FDF8EC" stroke="#C69214" stroke-width="2"/>
  <text x="450" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#182B49" font-family="Arial">Peony</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">(diffuse pattern)</text>
  <circle cx="450" cy="140" r="5" fill="#D32F2F"/>
  <g class="spark2">
    <circle class="tip" cx="430" cy="110" r="5" fill="#E57373"/><circle cx="425" cy="105" r="3" fill="#FFCDD2"/>
    <circle class="tip" cx="470" cy="108" r="5" fill="#E57373"/><circle cx="478" cy="103" r="3" fill="#FFCDD2"/>
    <circle class="tip" cx="485" cy="135" r="5" fill="#E57373"/><circle cx="490" cy="130" r="3" fill="#FFCDD2"/>
    <circle class="tip" cx="470" cy="168" r="5" fill="#E57373"/><circle cx="478" cy="175" r="3" fill="#FFCDD2"/>
    <circle class="tip" cx="430" cy="170" r="5" fill="#E57373"/><circle cx="425" cy="177" r="3" fill="#FFCDD2"/>
    <circle class="tip" cx="415" cy="140" r="5" fill="#E57373"/><circle cx="408" cy="137" r="3" fill="#FFCDD2"/>
    <circle cx="445" cy="120" r="3" fill="#FFCDD2"/><circle cx="455" cy="158" r="3" fill="#FFCDD2"/>
  </g>
  <text x="450" y="238" text-anchor="middle" font-size="12" fill="#333" font-family="Arial">= QCD jet (background)</text>
  <text x="450" y="256" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Dense, rounded cluster</text>

  <rect x="615" y="10" width="270" height="260" rx="12" fill="#FDF8EC" stroke="#C69214" stroke-width="2"/>
  <text x="750" y="40" text-anchor="middle" font-size="14" font-weight="bold" fill="#182B49" font-family="Arial">Willow</text>
  <text x="750" y="58" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">(3-prong pattern)</text>
  <circle cx="750" cy="140" r="5" fill="#1565C0"/>
  <g class="spark3">
    <line x1="750" y1="140" x2="710" y2="85" stroke="#1565C0" stroke-width="3"/>
    <circle class="tip" cx="706" cy="80" r="5" fill="#64B5F6"/><circle cx="700" cy="75" r="3" fill="#BBDEFB"/>
    <line x1="750" y1="140" x2="800" y2="88" stroke="#1565C0" stroke-width="3"/>
    <circle class="tip" cx="804" cy="84" r="5" fill="#64B5F6"/><circle cx="810" cy="79" r="3" fill="#BBDEFB"/>
    <line x1="750" y1="140" x2="750" y2="205" stroke="#1565C0" stroke-width="3"/>
    <circle class="tip" cx="750" cy="210" r="5" fill="#64B5F6"/><circle cx="746" cy="216" r="3" fill="#BBDEFB"/>
  </g>
  <text x="750" y="238" text-anchor="middle" font-size="12" fill="#333" font-family="Arial">= t to bqq jet</text>
  <text x="750" y="256" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Three distinct sub-sprays</text>
</svg>
