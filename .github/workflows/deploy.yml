name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: presentation/package-lock.json

      - name: Install and build Slidev
        working-directory: presentation
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/presentation
          cp index.html _site/
          cp *.pdf _site/
          cp *.jpg _site/ 2>/dev/null || true
          cp -r presentation/dist/* _site/presentation/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
